# render.yaml
# ----------------------------------------------------------------------------
# Render.com Blueprint for the Engineering Team landing page.
#
# Two valid deployment shapes:
#   1. Static Site (recommended — free, served from Render's edge CDN)
#   2. Web Service (Node, also free, but cold starts after inactivity)
#
# This blueprint defaults to the Static Site approach because it scores best
# on Lighthouse and has zero cold-start latency. If you need the Express
# server (e.g. to add API routes later), comment the static block and
# uncomment the web-service block.
# ----------------------------------------------------------------------------

services:
  - type: web
    name: engineering-team-landing
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # --- Alternative: Node web service (uncomment if you need server.js) ------
